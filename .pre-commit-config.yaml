repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-added-large-files
  - id: check-case-conflict
  - id: check-merge-conflict
  - id: check-symlinks
  - id: check-yaml
  - id: debug-statements
  - id: end-of-file-fixer
  - id: mixed-line-ending
  - id: trailing-whitespace

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: "2700fd5671c633760d912769c041bfcde2b9a01b"  # frozen: v0.15.22
  hooks:
  - id: ruff
    args: [--fix, --show-fixes]

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: "41e691678310dfd3833f7ab4e180ddb014310356"  # frozen: v2.3.0
  hooks:
    - id: mypy
      files: src
      args: []

- repo: https://github.com/abravalheri/validate-pyproject
  rev: "4b2e70d08cb2ccd26d1fba73588de41c7a5d50b7"  # frozen: v0.25
  hooks:
    - id: validate-pyproject
      additional_dependencies: ["validate-pyproject-schema-store[all]>=2024.10.21"]

- repo: https://github.com/python-jsonschema/check-jsonschema
  rev: "1a4bb160cab6417b3045e1b37b6b72449243e658"  # frozen: 0.37.4
  hooks:
    - id: check-dependabot
    - id: check-github-workflows
    - id: check-readthedocs

- repo: https://github.com/zizmorcore/zizmor-pre-commit
  rev: 64a97fb7fa63188393d3215c6e312f5f9c6d0f78  # frozen: v1.27.0
  hooks:
  - id: zizmor
    files: "^\\.github"
